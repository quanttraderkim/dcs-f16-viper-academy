<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viper Academy</title>
    <script>
        (function redirectToAcademy() {
            const pathname = window.location.pathname || "/";
            const basePath = pathname.endsWith("/")
                ? pathname
                : /\.[^/]+$/.test(pathname)
                  ? pathname.replace(/[^/]*$/, "")
                  : `${pathname}/`;
            const target = new URL(
                `f16_viper_academy.html${window.location.search || ""}${window.location.hash || ""}`,
                `${window.location.origin}${basePath}`
            );
            window.location.replace(target.toString());
        })();
    </script>
</head>
<body>
    <p><a href="f16_viper_academy.html">Viper Academy 열기</a></p>
</body>
</html>
